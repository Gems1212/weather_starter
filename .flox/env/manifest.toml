schema-version = "1.11.0"

[install]
nodejs.pkg-path = "nodejs"
nodejs.outputs = "all"
uv.pkg-path = "uv"

[vars]
BACKEND_PORT = "8000"
FRONTEND_PORT = "5173"

[services.backend]
command = '''
cd backend
uv run uvicorn app.main:app --reload --host 0.0.0.0 --port 8000
'''

[services.frontend]
command = '''
cd frontend
npm install
npm run dev -- --host 0.0.0.0 --port 5173
'''